services:
  # ML Service (FastAPI)
  - type: web
    name: sentilytics-ml
    env: python
    plan: free
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_DIR
        value: models
      - key: DEFAULT_MODEL
        value: logistic
      - key: PYTHON_VERSION
        value: 3.11.0

  # Backend (Node.js/Express)
  - type: web
    name: sentilytics-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: sentilytics-ml
          envVarKey: RENDER_EXTERNAL_URL
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d

  # Frontend (Vite Static Site)
  - type: web
    name: sentilytics-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sentilytics-backend
          envVarKey: RENDER_EXTERNAL_URL
